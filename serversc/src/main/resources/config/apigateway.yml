server:
  port: 8080

spring:
  application:
    name: apigateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
          lower-case-service-id: true
      routes:
        - id: case-service-route
          uri: lb://case-service
          predicates:
            - Path=/api/cases/**

        - id: investigator-service-route
          uri: lb://investigator-service
          predicates:
            - Path=/api/investigators/**

        - id: evidence-service-route
          uri: lb://evidence-service
          predicates:
            - Path=/api/evidences/**

        - id: person-service-route
          uri: lb://person-service
          predicates:
            - Path=/api/people/**

        - id: task-service-route
          uri: lb://task-service
          predicates:
            - Path=/api/tasks/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG