server:
  port: 8089
spring:
  application:
    name: notification-service
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:investigacionlascarinosas@gmail.com}
    password: ${MAIL_PASSWORD:abnnkwzbartaxdbq}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.*"
        spring.json.type.mapping: >
          caseCreated:com.example.notificationservice.events.CaseCreatedEvent,
          evidenceCreated:com.example.notificationservice.events.EvidenceCreatedEvent,
          taskAssigned:com.example.notificationservice.events.TaskAssignedEvent,
          taskCompleted:com.example.notificationservice.events.TaskCompletedEvent

notification:
  team-email: ${NOTIFICATION_TEAM_EMAIL:sofiaaristizabal23@gmail.com}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}